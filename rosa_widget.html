<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .rosa-widget-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .rosa-widget-bubble {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 100%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.4);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .rosa-widget-bubble:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .rosa-widget-tooltip {
            position: absolute;
            bottom: 75px;
            right: 0;
            background: white;
            padding: 12px 18px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 200px;
            font-size: 14px;
            color: #333;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            transform: translateY(10px);
        }

        .rosa-widget-container:hover .rosa-widget-tooltip {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .rosa-widget-icon {
            fill: white;
            width: 30px;
            height: 30px;
        }

        .rosa-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #4cd964;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            border: 2px solid white;
        }
        
        .rosa-text-name {
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
            color: #FF6B6B;
        }
    </style>
</head>
